databases:
  - name: my_project_db
    plan: free
    databaseName: my_project_db
    user: db_user

services:
  - type: web
    plan: free
    name: my_project
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'gunicorn my_project.wsgi:application'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my_project_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DJANGO_SETTINGS_MODULE
        value: my_project.settings